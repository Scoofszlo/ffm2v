name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on version tags
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
            node-version: '24'
            cache: 'npm'
            registry-url: 'https://registry.npmjs.org/'
    
      - name: Install dependencies
        run: npm ci
    
      - name: Build package
        run: npm run build
    
      - name: Publish to npm
        run: npm publish
