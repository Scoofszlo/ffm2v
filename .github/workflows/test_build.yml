name: Test build

on:
  workflow_dispatch:
  workflow_call:

jobs:
  typescript:
    name: Test build (tsdown)
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Run tsdown
        run: npm run build
